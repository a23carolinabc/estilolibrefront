<!DOCTYPE html>
<html lang="es-es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estilo Libre</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="Recursos/EstiloLibreLogo.svg" />
    <link href="EstiloLibreFront.styles.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css?v=8.14" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
    </div>

    <div id="blazor-error-ui">
        Ha ocurrido un error.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Cargar MudBlazor JS -->
    <script src="_content/MudBlazor/MudBlazor.min.js?v=8.14"></script>

    <script type="module">
        // Usar esm.sh en lugar de unpkg - resuelve dependencias automáticamente
        import * as backgroundRemoval from 'https://esm.sh/@imgly/background-removal@1.7.0';

        window.removeImageBackground = async function (imageDataUrl) {
            try {
                console.log('Iniciando eliminación de fondo...');

                if (!imageDataUrl) {
                    throw new Error('No se proporcionó imagen');
                }

                // Convertir dataURL a Blob
                const response = await fetch(imageDataUrl);
                const blob = await response.blob();

                // Llamar a removeBackground con modelo pequeño
                const resultBlob = await backgroundRemoval.removeBackground(blob, {
                    model: 'small',  // Modelo pequeño (~25 MB) - más rápido
                    debug: true,
                    progress: (key, current, total) => {
                        const porcentaje = Math.round((current / total) * 100);
                        console.log(`Progreso ${key}: ${porcentaje}%`);
                    }
                });

                // Convertir resultado a dataURL
                return await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(resultBlob);
                });

            } catch (err) {
                console.error('Error en removeImageBackground:', err);
                throw err;
            }
        };

        console.log('✓ removeImageBackground configurado con módulo ES6');
    </script>

    <!-- Utils.js si existe -->
    <script src="Utils.js"></script>

    <!-- Runtime de Blazor -->
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
